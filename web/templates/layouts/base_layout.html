{{ define "base" }}
<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/static/output.css" />

  <script src="/static/js/htmx.min.js"></script>
  <script src="/static/js/theme_bootstrap.js"></script>
  <script src="/static/js/theme_toggle.js"></script>

  {{ block "custom_head" . }}
    <title>PoliPlanner</title>
  {{ end }}
</head>

<body class="h-full bg-gray-100 text-gray-900" hx-boost="true">

  <div class="flex h-screen overflow-hidden">
    {{ template "fragments/sidebar" . }}

    <div class="flex flex-col flex-1 overflow-hidden">
      
      {{ template "fragments/navbar_mobile" . }}

      <main class="flex-1 overflow-y-auto p-6 pb-20 md:pb-8 md:pt-8">
        {{ block "content" . }}{{ end }}
      </main>

    </div>
  </div>

  {{ template "fragments/mobile-modal" . }}

  <script src="/static/js/medium_zoom.js"></script>
</body>
</html>
{{ end }}
