{{define "fragments/palette-selector"}}
<div id="palette-selector" class="fixed bottom-20 right-6 z-40 flex flex-col gap-2 bg-white rounded-sm shadow-lg p-3 border border-gray-200 hidden">
    <button type="button" data-theme="default-theme" class="w-full px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-sm">
        Default
    </button>
    <button type="button" data-theme="theme-warm" class="w-full px-4 py-2 text-sm font-medium text-amber-800 hover:bg-amber-50 rounded-sm">
        Warm
    </button>
    <button type="button" data-theme="theme-forest" class="w-full px-4 py-2 text-sm font-medium text-emerald-800 hover:bg-emerald-50 rounded-sm">
        Forest
    </button>
    <button type="button" data-theme="theme-lavender" class="w-full px-4 py-2 text-sm font-medium text-purple-800 hover:bg-purple-50 rounded-sm">
        Lavender
    </button>
    <button type="button" data-theme="theme-pink" class="w-full px-4 py-2 text-sm font-medium text-pink-800 hover:bg-pink-50 rounded-sm">
        Pink
    </button>
</div>
{{end}}
