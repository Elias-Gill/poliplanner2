{{ define "fragments/sidebar" }}
  <!-- Sidebar desktop -->
  <aside
    class="hidden h-screen md:flex md:flex-col md:w-64 border-r"
    style="background-color: var(--color-sidebar-bg); color: var(--color-sidebar-text); border-color: var(--color-sidebar-border);">
    <!-- Header -->
    <div
      class="p-5 border-b transition-colors"
      style="border-color: var(--color-sidebar-border); background-color: var(--color-sidebar-bg);"
      onmouseover="this.style.backgroundColor='var(--color-sidebar-hover)'"
      onmouseout="this.style.backgroundColor='var(--color-sidebar-bg)'">
      <div class="flex items-start justify-between">
        <a href="/guides/about">
          <div class="flex items-center gap-3">
            <img src="/static/favicon.ico" class="w-8 h-8" alt="Logo" />
            <span class="text-xl font-semibold">PoliPlanner</span>
          </div>
          <div
            class="mt-1 text-xs"
            style="color: var(--color-sidebar-text-muted);">
            Por estudiantes y para estudiantes
          </div>
        </a>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a
        href="/dashboard"
        class="nav-link flex items-center gap-3 px-4 py-3 rounded-sm transition-colors"
        style="color: var(--color-sidebar-text);"
        onmouseover="this.style.backgroundColor='var(--color-sidebar-hover)'"
        onmouseout="this.style.backgroundColor='transparent'">
        <i class="bi bi-speedometer2 text-lg"></i>
        <span>Dashboard</span>
      </a>
      <a
        href="/guides"
        class="nav-link flex items-center gap-3 px-4 py-3 rounded-sm transition-colors"
        style="color: var(--color-sidebar-text);"
        onmouseover="this.style.backgroundColor='var(--color-sidebar-hover)'"
        onmouseout="this.style.backgroundColor='transparent'">
        <i class="bi bi-book text-lg"></i>
        <span>Guías universitarias</span>
      </a>
      <a
        href="/tools"
        class="nav-link flex items-center gap-3 px-4 py-3 rounded-sm transition-colors"
        style="color: var(--color-sidebar-text);"
        onmouseover="this.style.backgroundColor='var(--color-sidebar-hover)'"
        onmouseout="this.style.backgroundColor='transparent'">
        <i class="bi bi-tools text-lg"></i>
        <span>Herramientas</span>
      </a>
    </nav>

    <!-- Zona inferior -->
    <div
      class="p-5 border-t space-y-4"
      style="border-color: var(--color-sidebar-border);">
      <div class="flex justify-center">
        {{ template "fragments/theme-toggle" "theme-toggle-desktop" }}
      </div>
      <div
        class="text-xs text-center"
        style="color: var(--color-sidebar-text-muted);">
        Parte de la Iniciativa PoliPlanner
      </div>
    </div>
  </aside>
{{ end }}
