{{ define "messages/error_message" }}
  <section
    role="alert"
    class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
    <span class="block sm:inline">{{ . }}</span>
    <button
      type="button"
      onclick="this.parentElement.remove()"
      class="absolute top-0 bottom-0 right-0 px-3 py-2 text-red-700 hover:text-red-900 focus:outline-none"
      aria-label="Close">
      ×
    </button>
  </section>
{{ end }}
{{ define "messages/success_message" }}
  <section
    role="alert"
    class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
    <span class="block sm:inline">{{ . }}</span>
    <button
      type="button"
      onclick="this.parentElement.remove()"
      class="absolute top-0 bottom-0 right-0 px-3 py-2 text-green-700 hover:text-green-900 focus:outline-none"
      aria-label="Close">
      ×
    </button>
  </section>
{{ end }}
