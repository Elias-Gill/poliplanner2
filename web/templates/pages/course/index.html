{{define "content"}}
<main>
  <h1>Cursos por carrera</h1>
  <section id="careerSelector">
    <label for="careerId">
      <h3>Carrera</h3>
    </label>
    <select onchange="htmx.ajax('GET', '/course/list/' + this.value, {target:'#coursesList', swap:'innerHTML'})">
      <option value="" disabled selected>Seleccioná una carrera</option>
      {{ range . }}
      <option value="{{.ID}}">{{.CareerCode}} – {{.Name}}</option>  <!-- asumiendo que Career tiene Name y CareerCode -->
      {{ end }}
    </select>
  </section>

  <section>
    <div id="coursesList">
      <!-- HTMX inyecta la lista de cursos aquí -->
    </div>
  </section>

  <!-- Modal fijo -->
  <div id="courseModal" class="modal-overlay" style="display: none;">
    <div class="modal-dialog">
      <div id="modalContent"></div>
    </div>
  </div>

  <style>
    /* mismo estilo que tenías antes, sin cambios */
    #coursesList.htmx-swapping { opacity: 0; transition: opacity .2s ease-out; }
    #coursesList.htmx-settling { opacity: 1; transition: opacity .2s ease-in; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    .modal-dialog { background: var(--color-bg); padding: var(--space-xl); width: 80%; border-radius: var(--border-radius); box-shadow: 0 8px 24px rgba(0,0,0,0.15); position: relative; max-height: 80vh; overflow-y: auto; }
    .modal-close-btn { position: absolute; top: 0.4rem; right: 0.4rem; padding: 0.35rem 0.75rem; }
  </style>

  <script>
    window.closeCourseModal = function() {
      document.getElementById('courseModal').style.display = 'none';
      document.getElementById('modalContent').innerHTML = '';
    };

    document.getElementById('courseModal').addEventListener('click', function(e) {
      if (e.target === this) closeCourseModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeCourseModal();
    });

    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.target.id === 'modalContent' && e.detail.xhr.status === 200) {
        document.getElementById('courseModal').style.display = 'flex';
      }
    });

    document.body.addEventListener('htmx:beforeSwap', function(e) {
      if (e.target.id === 'modalContent') {
        e.target.innerHTML = '';
      }
    });
  </script>
</main>
{{end}}
