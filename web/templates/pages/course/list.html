<style>
  .mb-1rem { margin-bottom: 1rem; }
  .courses-container-box {
    max-height: 60vh;
    overflow-y: auto;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    background: var(--color-bg);
    padding: 1rem;
  }
  .course-item {
    padding: .75rem;
    border-bottom: 1px solid var(--color-border);
    cursor: pointer;
  }
  .course-item:hover {
    background: var(--color-bg-hover);
  }
  .course-title {
    font-weight: bold;
  }
  .course-meta {
    font-size: 0.85rem;
    opacity: 0.85;
  }
</style>

<div class="schedule-container">
  <div class="courses-list-column">
    <div class="mb-1rem">
      <label for="semesterFilter">Filtrar por semestre:</label>
      <select id="semesterFilter">
        <option value="all" selected>Todos los semestres</option>
      </select>
    </div>
    <div class="mb-1rem">
      <label for="courseSearch">Buscar por materia:</label>
      <input type="text" id="courseSearch" placeholder="Ej. Física">
    </div>

    {{if .}}
    <div id="coursesContainer" class="courses-container-box"></div>
    {{else}}
    <p>No se encontraron cursos.</p>
    {{end}}
  </div>
</div>

{{if .}}
<script>
  const coursesRaw = [
    {{range .}}
    {
      id: "{{.ID}}",
      subjectName: "{{.SubjectName | js}}",
      semester: {{.Semester}},
      section: "{{.Section | js}}",
      teacher: "{{.Teachers | js}}"  // ahora usa directamente el campo Teachers string
    },
    {{end}}
  ];

  coursesRaw.sort((a, b) => a.semester - b.semester);

  const container = document.getElementById('coursesContainer');
  const searchInput = document.getElementById('courseSearch');
  const semesterFilter = document.getElementById('semesterFilter');

  const uniqueSemesters = [...new Set(coursesRaw.map(c => c.semester))];
  uniqueSemesters.forEach(sem => {
    const opt = document.createElement('option');
    opt.value = sem;
    opt.textContent = "Semestre " + sem;
    semesterFilter.appendChild(opt);
  });

  function matchesFilters(course) {
    const sem = semesterFilter.value;
    if (sem !== "all" && Number(sem) !== course.semester) return false;

    const q = searchInput.value.trim().toLowerCase();
    if (!q) return true;

    return course.subjectName.toLowerCase().includes(q);
  }

  function renderCourses() {
    container.innerHTML = '';

    coursesRaw.filter(matchesFilters).forEach(course => {
      const div = document.createElement('div');
      div.className = 'course-item';

      div.setAttribute('hx-get', `/course/detail/${course.id}`);
      div.setAttribute('hx-target', '#modalContent');
      div.setAttribute('hx-swap', 'innerHTML');

      div.innerHTML = `
        <div class="course-title">${course.subjectName}</div>
        <div class="course-meta">
          Semestre ${course.semester} · Sección ${course.section}<br>
          ${course.teacher || 'Sin docente asignado'}
        </div>
      `;

      container.appendChild(div);
    });

    htmx.process(container);
  }

  searchInput.addEventListener('input', renderCourses);
  semesterFilter.addEventListener('change', renderCourses);

  renderCourses();
</script>
{{end}}
