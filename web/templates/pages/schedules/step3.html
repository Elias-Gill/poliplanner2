{{ define "content" }}
  <div class="space-y-6">
    <form
      id="schedule-form"
      method="POST"
      action="/schedule/step3"
      class="space-y-6">
      <input type="hidden" name="title" value="{{ .Title }}" />

      {{ range .Sections }}
        <details class="bg-white rounded-sm shadow border border-gray-300">
          <summary
            class="text-lg font-semibold cursor-pointer select-none p-4 border-b border-gray-300">
            {{ .Subject }}
          </summary>

          <div class="p-4 space-y-2">
            {{ if .Offer }}
              {{ range .Offer }}
                <label
                  class="flex items-center gap-3 p-2 rounded-sm hover:bg-gray-50 cursor-pointer border border-gray-300">
                  <input
                    type="checkbox"
                    name="section_ids"
                    value="{{ .ID }}"
                    class="w-4 h-4" />

                  <div class="flex-1">
                    <div class="font-medium">
                      {{ .CourseName }} - Sección
                      {{ .Section }}
                    </div>

                    <div class="text-sm text-gray-500">
                      Tipo:
                      <span
                        class="{{ if eq .Type 0 }}
                          text-primary-600
                        {{ else }}
                          text-red-400
                        {{ end }}">
                        {{ if eq .Type 0 }}
                          Curso normal
                        {{ else }}
                          Solo examen final
                        {{ end }}
                      </span>
                      <br />

                      Profesores:
                      {{ range $i, $t := .Teachers }}
                        {{ if $i }},{{ end }}
                        {{ $t.Name }}
                      {{ end }}
                    </div>
                  </div>
                </label>
              {{ end }}
            {{ else }}
              <span class="text-gray-500">Sin oferta para este semestre.</span>
            {{ end }}
          </div>
        </details>
      {{ end }}


      <div class="flex justify-end">
        <button
          type="button"
          onclick="openConfirmModal()"
          class="px-6 py-2 bg-primary-600 text-white rounded-sm hover:bg-primary-700">
          Continuar
        </button>
      </div>
    </form>

    <!-- Modal -->
    <div
      id="confirm-modal"
      class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">
      <div class="bg-white rounded-sm shadow-lg w-full max-w-md p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-3">
          Confirmar creación de horario
        </h2>

        <p class="text-sm text-gray-600 mb-6">
          ¿Estás seguro de que deseas crear este horario con las secciones
          seleccionadas?
        </p>

        <div class="flex justify-end gap-3">
          <button
            type="button"
            onclick="closeConfirmModal()"
            class="px-4 py-2 border border-gray-300 rounded-sm hover:bg-gray-100">
            Cancelar
          </button>

          <button
            type="button"
            onclick="submitScheduleForm()"
            class="px-4 py-2 bg-primary-600 text-white rounded-sm hover:bg-primary-700">
            Confirmar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function openConfirmModal() {
      const modal = document.getElementById("confirm-modal");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeConfirmModal() {
      const modal = document.getElementById("confirm-modal");
      modal.classList.remove("flex");
      modal.classList.add("hidden");
    }

    function submitScheduleForm() {
      document.getElementById("schedule-form").submit();
    }
  </script>
{{ end }}
