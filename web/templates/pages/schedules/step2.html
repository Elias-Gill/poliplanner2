{{define "content"}}
<form method="POST" action="/schedule/step2" class="space-y-6">
    <input type="hidden" name="career_id" value="{{ .ID }}">

    {{ range .Semesters }}
    <div class="bg-white rounded-xl shadow p-4">
        <h3 class="text-lg font-semibold mb-3">
            Semestre {{ .Number }}
        </h3>

        <div class="grid md:grid-cols-2 gap-2">
            {{ range .Assignments }}
            <label class="flex items-center gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer border">
                <input
                    type="checkbox"
                    name="assignment_ids"
                    value="{{ .ID }}"
                    class="w-4 h-4"
                >
                <div>
                    <div class="font-medium">
                        {{ .Name }}
                    </div>
                    <div class="text-sm text-gray-500">
                        {{ .Department }}
                    </div>
                </div>
            </label>
            {{ end }}
        </div>
    </div>
    {{ end }}

    <div class="flex justify-end">
        <button
            type="submit"
            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
        >
            Continuar
        </button>
    </div>

</form>
{{end}}
