{{define "custom_head"}}
<title>Dashboard - PoliPlanner</title>
{{end}}

{{define "content"}}
<div class="p-6 md:p-10 space-y-8">

  <!-- Header con selector y toggle -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Tu Dashboard</h1>
      <p class="text-gray-600 mt-1">Ve aquí la información de tus horarios</p>
    </div>

    <div class="flex flex-col md:flex-row md:items-center gap-4">
      <div>
        <label for="schedule-select" class="block text-sm font-medium text-gray-700 mb-1">
          Horario actual
        </label>
        <select id="schedule-select"
          class="border border-gray-300 rounded-sm px-3 py-2 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-900">
          <option value="1">Horario 1</option>
          <option value="2">Horario 2</option>
        </select>
      </div>

      <div class="inline-flex bg-gray-200 rounded-full p-1 mt-2 md:mt-0">
        <button class="px-4 py-2 bg-white rounded-full text-gray-900 font-medium shadow-sm"
          data-view="overview">
          Overview
        </button>
        <button class="px-4 py-2 text-gray-600 font-medium"
          data-view="calendar">
          Calendario
        </button>
      </div>
    </div>
  </div>

  <!-- Sección: Horario semanal -->
  <section class="bg-white rounded-sm shadow p-4">
    <h2 class="text-xl font-semibold text-gray-900 mb-2">Horario semanal</h2>

    <div id="weekly-schedule"
         hx-get="/dashboard/schedule"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#week-spinner">

      <div id="week-spinner"
           class="flex justify-center items-center h-32 htmx-indicator">
        <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
      </div>

    </div>
  </section>

  <!-- Sección: Exámenes -->
  <section class="bg-white rounded-sm shadow p-4">
    <h2 class="text-xl font-semibold text-gray-900 mb-2">
      Exámenes finales y parciales
    </h2>

    <div id="exams"
         hx-get="/dashboard/exams"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#exams-spinner">

      <div id="exams-spinner"
           class="flex justify-center items-center h-24 htmx-indicator">
        <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
      </div>

    </div>
  </section>

  <!-- Sección: Información extra -->
  <section class="bg-white rounded-sm shadow p-4">
    <h2 class="text-xl font-semibold text-gray-900 mb-2">
      Información de materias inscriptas
    </h2>

    <div id="subjects-extra-info"
         hx-get="/dashboard/sections"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#subjects-spinner">

      <div id="subjects-spinner"
           class="flex justify-center items-center h-24 htmx-indicator">
        <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
      </div>

    </div>
  </section>

</div>
{{end}}
