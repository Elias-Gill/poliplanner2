{{ define "custom_head" }}
<title>Malla Curricular - PoliPlanner</title>
{{ end }}

{{ define "content" }}
<script lazy type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<div class="relative w-full h-full bg-gray-100 overflow-hidden">

  <!-- Selector de carreras -->
  <div class="absolute top-4 left-4 z-50 bg-white shadow rounded-sm px-3 py-2 flex items-center gap-2">
    <label for="subject-select" class="text-sm font-medium">Carrera:</label>
    <select id="subject-select" class="border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      <option value="IIN.json">IIN</option>
      <option value="LCA.json">LCA</option>
      <option value="IEN.json">IEN</option>
      <!-- FUTURE: agregá las demás que tengas -->
    </select>
  </div>

    <!-- Mini guía táctil flotante -->
    <div class="absolute bottom-4 right-4 z-50">
      <div class="bg-black/60 backdrop-blur-sm text-white px-2 py-1 rounded-full flex items-center gap-1 text-xs pointer-events-none opacity-70 border border-white/20 sm:text-sm">
        <span>🖱️</span> Hover o click • <span>👆</span>Tocar o mantener
      </div>
    </div>

  <!-- Contenedor del grafo full-screen -->
  <div id="graph-container" class="absolute inset-0 bg-white touch-none"></div>

  <!-- Loading overlay -->
  <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-30 transition-opacity">
    <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
  </div>

  <!-- Error message -->
  <div id="error" class="fixed bottom-5 left-5 right-5 bg-red-500 text-white p-4 rounded-xl text-center font-medium shadow-lg z-40 hidden">
    Error al cargar la malla. Intentá de nuevo.
  </div>

</div>

<script src="/static/js/interactive_graph.js"></script>
<script src="/static/js/interactive_graph_load.js"></script>
{{ end }}
