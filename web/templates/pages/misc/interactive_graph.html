<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Malla Curricular</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
    }

    /* Contenedor del grafo - pantalla completa */
    #graph-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100vh;
      background: white;
      touch-action: none;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .error-message {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #ef4444;
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
      z-index: 40;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Mini guía táctil */
    .touch-guide {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 8px;
      border-radius: 30px;
      font-size: 0.8rem;
      z-index: 15;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.7;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .touch-guide span {
      font-size: 1rem;
    }

    @media (max-width: 480px) {      
      .touch-guide {
        font-size: 0.7rem;
        padding: 6px 12px;
        bottom: 12px;
        right: 12px;
      }
    }

    /* Para pantallas muy pequeñas, ocultar guía táctil */
    @media (max-width: 320px) {
      .touch-guide {
        display: none;
      }
    }
  </style>

  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

  <!-- Contenedor del grafo (pantalla completa) -->
  <div id="graph-container"></div>
  
  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <!-- Error message -->
  <div class="error-message" id="error">
    Error al cargar la malla. Intentá de nuevo.
  </div>

  <!-- Guía táctil flotante -->
  <div class="touch-guide">
    <span>👆</span> Arrastrá • Presioná
  </div>

  <script src="/src/graph_lib.js"></script>
  <script>
    (function() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      
      async function loadGraph() {
        try {
          loadingEl.classList.remove('hidden');
          
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);
          
          const response = await fetch('/src/data/IIN.json', {
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          if (!response.ok) throw new Error('Error en la respuesta');
          
          const data = await response.json();
          
          if (typeof prepareGraphData !== 'function' || typeof renderGraph !== 'function') {
            throw new Error('Librería no cargada');
          }
          
          prepareGraphData(data);
          renderGraph("graph-container");
          
          setTimeout(() => {
            loadingEl.classList.add('hidden');
          }, 300);
          
        } catch (error) {
          console.error('Error:', error);
          loadingEl.classList.add('hidden');
          errorEl.classList.add('show');
          
          setTimeout(() => {
            errorEl.classList.remove('show');
          }, 3000);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadGraph);
      } else {
        loadGraph();
      }
    })();
  </script>

</body>
</html>
