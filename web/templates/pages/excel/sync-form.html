{{define "custom_head"}}
<head>
  <title>Excel Dashboard</title>
  <style>
    .alert { padding: 12px; margin: 12px 0; border-radius: 4px; }
    .success { background: #e6ffe6; color: #006600; }
    .error { background: #ffe6e6; color: #990000; }
    .form-group { margin: 16px 0; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
{{end}}

{{define "content"}}
<main>
  <h1>Sync Excel Dashboard</h1>

  <section>
    <h2>Update Excel Data</h2>
    <form id="excelForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="authKey">Authorization Key (Bearer):</label>
        <input type="password" id="authKey" name="authKey" required placeholder="Enter key here" />
      </div>

      <div class="form-group">
        <label for="downloadUrl">Download URL (optional):</label>
        <input type="url" id="downloadUrl" name="downloadUrl" placeholder="https://example.com/file.xlsx" />
      </div>

      <div class="form-group">
        <label for="fileInput">Excel file (.xls, .xlsx):</label>
        <input type="file" id="fileInput" name="file" accept=".xls,.xlsx" />
        <small>(leave empty to trigger automatic sync)</small>
      </div>

      <button type="submit">Process Update</button>
    </form>

    <div id="result" hx-swap-oob="true"></div>
  </section>

  <script>
    document.getElementById('excelForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const form = e.target;
      const key = document.getElementById('authKey').value.trim();
      const fileInput = document.getElementById('fileInput');
      const resultEl = document.getElementById('result');

      if (!key) {
        showMessage(resultEl, 'error', 'Authorization key is required');
        return;
      }

      const formData = new FormData(form);
      // Remove empty file if no upload
      if (fileInput.files.length === 0) {
        formData.delete('file');
      }

      try {
        const response = await fetch('/excel/sync', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${key}`
          },
          body: formData
        });

        const text = await response.text();

        if (response.ok) {
          showMessage(resultEl, 'success', text || 'Update completed successfully');
        } else {
          showMessage(resultEl, 'error', text || 'Update failed');
        }
      } catch (err) {
        showMessage(resultEl, 'error', `Network error: ${err.message}`);
      }
    });

    function showMessage(el, type, msg) {
      el.innerHTML = `
        <div class="alert ${type}">
          ${msg}
          <button onclick="this.parentElement.remove()">×</button>
        </div>
      `;
    }
  </script>
</main>
{{end}}
