{{ define "custom_head" }}
  <title>Nueva contraseña - PoliPlanner</title>
{{ end }}

{{ define "content" }}
  <div class="md:h-full md:justify-center md:items-center flex">
    <div class="w-full max-w-md bg-white rounded-sm shadow-lg p-6 md:p-10">
      <div class="text-center mb-5 md:mb-6">
        <img
          src="/static/logo.svg"
          alt="Logo PoliPlanner"
          class="mx-auto h-16 w-auto md:h-20" />
        <h2 class="mt-4 text-2xl font-bold text-gray-900">Nueva contraseña</h2>
      </div>

      <!-- Mensajes de error o éxito -->
      {{ if .Success }}
        <div
          class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-sm text-sm">
          {{ .Success }}
        </div>
      {{ else if .Error }}
        <div
          class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-sm text-sm">
          {{ .Error }}
        </div>
      {{ end }}

      {{ if not .Success }}
        <!-- No mostrar el formulario si ya tuvo éxito -->
        <form
          method="POST"
          action="/password-recovery/{{ .Token }}"
          class="space-y-4 md:space-y-5">
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-700 mb-1">
              Nueva contraseña
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              minlength="6"
              placeholder="Nueva contraseña"
              class="block w-full px-3 py-2.5 border border-gray-300 rounded-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-900 placeholder-gray-400 transition-colors" />
          </div>

          <div>
            <label
              for="confirm_password"
              class="block text-sm font-medium text-gray-700 mb-1">
              Confirmar contraseña
            </label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
              minlength="6"
              placeholder="Confirmar contraseña"
              class="block w-full px-3 py-2.5 border border-gray-300 rounded-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-900 placeholder-gray-400 transition-colors" />
          </div>

          <button
            type="submit"
            class="w-full bg-primary-600 text-white py-3 rounded-sm font-semibold hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors mt-1">
            Actualizar contraseña
          </button>
        </form>
      {{ end }}


      <div class="mt-6 text-center text-sm text-gray-600">
        <a
          href="/login"
          class="font-medium text-primary-600 hover:text-primary-700 transition-colors">
          Volver a iniciar sesión
        </a>
      </div>
    </div>
  </div>
{{ end }}
