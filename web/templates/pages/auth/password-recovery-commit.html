{{ define "custom_head" }}
  <title>Nueva contraseña - PoliPlanner</title>
{{ end }}

{{ define "content" }}
<main class="mt-8 md:mt-0 md:min-h-screen md:justify-center md:items-center flex bg-gray-50 px-4 py-0 md:py-12">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6 md:p-10">

    <div class="text-center mb-5 md:mb-6">
      <img src="/static/logo.svg" alt="Logo PoliPlanner" class="mx-auto h-16 w-auto md:h-20" />
      <h2 class="mt-4 text-2xl font-bold text-gray-900">Nueva contraseña</h2>
    </div>

    <form
      hx-post="/password-recovery/{{ .Token }}"
      hx-target="#errors"
      hx-swap="innerHTML"
      method="post"
      class="space-y-4 md:space-y-5"
    >
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Nueva contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="Nueva contraseña"
          class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-900 placeholder-gray-400 transition-colors"
        />
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">
          Confirmar contraseña
        </label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          required
          placeholder="Confirmar contraseña"
          class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-900 placeholder-gray-400 transition-colors"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-primary-600 text-white py-3 rounded-lg font-semibold hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors mt-1"
      >
        Actualizar contraseña
      </button>

      <div id="errors" class="text-center text-sm pt-1"></div>
    </form>

    <div class="mt-3 text-center text-sm text-gray-600">
      <a href="/login" class="font-medium text-primary-600 hover:text-primary-700 transition-colors">
        Volver a iniciar sesión
      </a>
    </div>

  </div>
</main>
{{ end }}
